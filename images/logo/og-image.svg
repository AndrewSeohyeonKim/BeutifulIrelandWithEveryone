<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Andrew의 아일랜드 동행 — Beautiful Ireland with Everyone">
  <defs>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B6E4F"/>
      <stop offset="55%" stop-color="#0A5E3E"/>
      <stop offset="100%" stop-color="#073D29"/>
    </linearGradient>
    <linearGradient id="og-leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4EDE0"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <!-- Subtle Ireland silhouette watermark (large, decorative right) -->
  <g opacity="0.06" fill="#FFFFFF" transform="translate(820,130) scale(2.6)">
    <path d="M58,38 C50,40 48,52 52,62 C44,68 42,82 50,90 C42,98 44,112 52,118 C46,128 50,140 60,144 C66,156 80,160 92,156 C100,164 116,164 124,156 C138,158 150,148 150,134 C158,128 160,114 152,106 C160,96 156,80 146,76 C148,64 140,52 128,52 C122,42 108,38 96,42 C84,36 68,36 58,38 Z"/>
  </g>

  <!-- Decorative cream border line -->
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="none" stroke="#F4EDE0" stroke-width="2" stroke-opacity="0.25"/>

  <!-- Logo icon (center-left) -->
  <g transform="translate(110,160)">
    <rect width="200" height="200" rx="44" fill="#F4EDE0"/>
    <g transform="translate(100,96)" fill="#0B6E4F">
      <g transform="translate(0,-30)">
        <path d="M0,0 C-2,-10 -16,-18 -22,-10 C-30,0 -22,14 -10,16 C-4,18 0,22 0,22 C0,22 4,18 10,16 C22,14 30,0 22,-10 C16,-18 2,-10 0,0 Z"/>
      </g>
      <g transform="rotate(-120) translate(0,-30)">
        <path d="M0,0 C-2,-10 -16,-18 -22,-10 C-30,0 -22,14 -10,16 C-4,18 0,22 0,22 C0,22 4,18 10,16 C22,14 30,0 22,-10 C16,-18 2,-10 0,0 Z"/>
      </g>
      <g transform="rotate(120) translate(0,-30)">
        <path d="M0,0 C-2,-10 -16,-18 -22,-10 C-30,0 -22,14 -10,16 C-4,18 0,22 0,22 C0,22 4,18 10,16 C22,14 30,0 22,-10 C16,-18 2,-10 0,0 Z"/>
      </g>
      <path d="M0,8 Q-4,28 8,52" stroke="#0B6E4F" stroke-width="6" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- Tagline + Title (right of icon) -->
  <g transform="translate(360,170)" font-family="'Noto Sans KR', 'Helvetica Neue', sans-serif">
    <!-- small eyebrow -->
    <text x="0" y="0" font-size="22" font-weight="600" fill="#F4EDE0" opacity="0.7" letter-spacing="6">🇮🇪 SINCE 2022 · DUBLIN</text>

    <!-- Main Korean title -->
    <text x="0" y="80" font-size="80" font-weight="900" fill="#FFFFFF" letter-spacing="-2">아일랜드 동행</text>

    <!-- English title line 1 -->
    <text x="0" y="155" font-size="42" font-weight="700" fill="#F4EDE0" letter-spacing="0">Beautiful Ireland</text>
    <!-- English title line 2 -->
    <text x="0" y="205" font-size="42" font-weight="700" fill="#F4EDE0" letter-spacing="0">with Everyone</text>

    <!-- Tagline -->
    <text x="0" y="275" font-size="22" font-weight="500" fill="#A9D9C2" opacity="0.95">친구처럼 함께 — 서현 Andrew · 더블린 거주 4년</text>
  </g>

  <!-- Bottom service strip -->
  <g transform="translate(110,520)" font-family="'Noto Sans KR', sans-serif" fill="#F4EDE0">
    <text x="0" y="0" font-size="20" font-weight="500" opacity="0.85">✈️ 공항 픽업·드랍   ·   🌿 당일 로드트립   ·   🏠 이사·운송   ·   ✏️ 커스텀 여행</text>
    <text x="0" y="40" font-size="16" font-weight="400" opacity="0.6">사회봉사 활동(Classical Music for Everyone) 순환 운영</text>
  </g>
</svg>
